name: Build CoreX APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 جلب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 تثبيت المكتبات المطلوبة
        run: |
          pip install flet
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk

      - name: 🏗️ بدء بناء تطبيق CoreX
        id: build_step
        run: flet build apk --project "corex" --product "CoreX Tool" --org "com.corex.root"
        continue-on-error: true

      - name: 📝 إظهار ملخص الحالة
        run: |
          if [ "${{ steps.build_step.outcome }}" == "success" ]; then
            echo "### ✅ حالة البناء: ناجحة" >> $GITHUB_STEP_SUMMARY
            echo "تم إنشاء ملف APK بنجاح ورفعه للمخرجات." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ حالة البناء: فشل" >> $GITHUB_STEP_SUMMARY
            echo "حدث خطأ أثناء تجميع التطبيق. يرجى مراجعة سجلات التشغيل (Logs)." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: 📤 رفع ملف APK النهائي
        if: steps.build_step.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CoreX-APK
          path: build/apk/*.apk
