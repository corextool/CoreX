name: Build CoreX APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: |
          pip install flet
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
      - name: Build APK
        run: flet build apk --project-name "CoreX Tool" --org "com.corex.root"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CoreX-APK
          path: build/apk/*.apk
